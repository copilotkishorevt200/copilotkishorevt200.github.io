<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freakers Admin | Product Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Oswald:wght@700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --background: #0a0a0a;
            --foreground: #ffffff;
            --accent: #d946ef;
            /* Electric Purple */
            --accent-glow: #d946efaa;
        }

        body {
            background-color: var(--background);
            color: var(--foreground);
            font-family: 'Inter', sans-serif;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
        }

        .accent-bg {
            background-color: var(--accent);
        }

        .accent-text {
            color: var(--accent);
        }

        .accent-border {
            border-color: var(--accent);
        }

        /* Cyberpunk Glitch Effect on Hover */
        .cyber-btn {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .cyber-btn:hover {
            box-shadow: 0 0 15px var(--accent-glow);
            text-shadow: 0 0 5px #fff;
        }
    </style>
</head>

<body class="p-6 md:p-12">
    <div class="max-w-7xl mx-auto">
        <header
            class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 border-b border-white/10 pb-6 gap-4">
            <div>
                <h1 class="text-3xl md:text-4xl font-bold tracking-tighter accent-text">FREAKERS <span
                        class="text-white">ADMIN</span></h1>
                <p class="text-gray-400 text-sm">Manage your inventory</p>
            </div>
            <a href="index.html"
                class="text-xs md:text-sm text-gray-500 hover:text-white transition uppercase tracking-widest border border-white/10 px-4 py-2 rounded hover:bg-white/5">Back
                to Store</a>
        </header>

        <div class="grid lg:grid-cols-3 gap-12">
            <!-- Product Form -->
            <div class="bg-zinc-900/50 p-8 border border-white/10 rounded-lg h-fit sticky top-6">
                <h2 id="formTitle" class="text-xl font-bold mb-6">Add New Product</h2>
                <form id="productForm" class="space-y-4">
                    <input type="hidden" id="productId">

                    <div>
                        <label class="block text-xs uppercase tracking-widest text-gray-500 mb-1">Product Name</label>
                        <input type="text" id="name" required
                            class="w-full bg-black border border-white/20 p-3 focus:border-purple-500 outline-none transition rounded-sm">
                    </div>

                    <div>
                        <label class="block text-xs uppercase tracking-widest text-gray-500 mb-1">Price</label>
                        <input type="number" id="price" step="0.01" required
                            class="w-full bg-black border border-white/20 p-3 focus:border-purple-500 outline-none transition rounded-sm">
                    </div>

                    <div>
                        <label class="block text-xs uppercase tracking-widest text-gray-500 mb-1">Category</label>
                        <input type="text" id="category" list="category-list" required
                            class="w-full bg-black border border-white/20 p-3 focus:border-purple-500 outline-none transition rounded-sm"
                            placeholder="Select or type new category">
                        <datalist id="category-list">
                            <!-- Populated by JS -->
                        </datalist>
                    </div>

                    <div>
                        <label class="block text-xs uppercase tracking-widest text-gray-500 mb-1">Description</label>
                        <textarea id="description" rows="3" required
                            class="w-full bg-black border border-white/20 p-3 focus:border-purple-500 outline-none transition rounded-sm"></textarea>
                    </div>

                    <div>
                        <label class="block text-xs uppercase tracking-widest text-gray-500 mb-1">Image URLs</label>
                        <input type="text" id="image" required
                            class="w-full bg-black border border-white/20 p-3 focus:border-purple-500 outline-none transition rounded-sm"
                            placeholder="https://...">
                        <p class="text-[10px] text-gray-500 mt-1">Separate multiple URLs with commas.</p>
                    </div>

                    <div class="pt-4 flex gap-2">
                        <button type="submit"
                            class="cyber-btn flex-1 accent-bg text-black py-3 font-bold uppercase tracking-wider hover:bg-white transition">Save
                            Product</button>
                        <button type="button" id="cancelBtn"
                            class="hidden px-4 py-3 border border-white/20 hover:bg-white/10 transition">Cancel</button>
                    </div>
                </form>
            </div>

            <!-- Product List -->
            <div class="lg:col-span-2">
                <h2 class="text-xl font-bold mb-6 flex justify-between items-center">
                    Current Inventory
                    <span id="productCount" class="text-sm font-normal text-gray-500 bg-zinc-900 px-2 py-1 rounded">0
                        Products</span>
                </h2>

                <div id="loading" class="text-center py-20 text-gray-500 animate-pulse">
                    Loading inventory from the matrix...
                </div>

                <div id="productList" class="space-y-4">
                    <!-- Products injected here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast"
        class="fixed bottom-6 right-6 bg-zinc-900 border border-purple-500 text-white px-6 py-4 rounded shadow-2xl transform translate-y-24 transition duration-300 flex items-center gap-3">
        <div class="w-2 h-2 rounded-full bg-purple-500"></div>
        <span id="toastMsg">Operation successful</span>
    </div>

    <script>
        // API Base URL
        const API = '/api/products';

        // State
        let products = [];
        let isEditing = false;

        // DOM Elements
        const form = document.getElementById('productForm');
        const productList = document.getElementById('productList');
        const formTitle = document.getElementById('formTitle');
        const cancelBtn = document.getElementById('cancelBtn');
        const loading = document.getElementById('loading');
        const toast = document.getElementById('toast');
        const toastMsg = document.getElementById('toastMsg');

        // Fetch Products
        async function fetchProducts() {
            try {
                const res = await fetch(API);
                if (res.status === 401) {
                    window.location.href = 'login.html';
                    return;
                }
                products = await res.json();
                renderProducts();
            } catch (err) {
                console.error('Failed to fetch products:', err);
                showToast('Failed to load products', true);
            } finally {
                loading.classList.add('hidden');
            }
        }

        // Check Auth on Load
        async function checkAuth() {
            try {
                const res = await fetch('/api/user');
                if (!res.ok) {
                    window.location.href = 'login.html';
                }
            } catch (e) {
                window.location.href = 'login.html';
            }
        }

        // Render Products
        function renderProducts() {
            document.getElementById('productCount').textContent = `${products.length} Products`;

            // Populate Category Datalist
            const categories = [...new Set(products.map(p => p.category))];
            const datalist = document.getElementById('category-list');
            datalist.innerHTML = categories.map(c => `<option value="${c}">`).join('');

            productList.innerHTML = products.map(p => `
                <div class="bg-zinc-900/30 border border-white/5 p-4 rounded flex flex-col sm:flex-row gap-4 items-start sm:items-center group hover:border-purple-500/50 transition duration-300">
                    <img src="${p.images[0]}" alt="${p.name}" class="w-full sm:w-16 h-48 sm:h-16 object-cover rounded bg-zinc-800">
                    
                    <div class="flex-1 w-full">
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="font-bold text-lg leading-tight group-hover:text-purple-400 transition">${p.name}</h3>
                                <p class="text-xs text-gray-500 uppercase tracking-wider mt-1">${p.category}</p>
                            </div>
                            <span class="font-mono text-purple-400">$${p.price}</span>
                        </div>
                         <p class="text-xs text-zinc-600 mt-1 truncate max-w-md">${p.description}</p>
                    </div>

                    <div class="flex gap-2 w-full sm:w-auto justify-end opacity-100 sm:opacity-0 group-hover:opacity-100 transition duration-300">
                        <button onclick="editProduct(${p.id})" class="p-2 bg-white/5 hover:bg-white/10 rounded text-blue-400" title="Edit">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>
                        </button>
                        <button onclick="deleteProduct(${p.id})" class="p-2 bg-white/5 hover:bg-white/10 rounded text-red-500" title="Delete">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // Handle Form Submit
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = {
                name: document.getElementById('name').value,
                price: document.getElementById('price').value,
                category: document.getElementById('category').value,
                description: document.getElementById('description').value,
                images: document.getElementById('image').value.split(',').map(url => url.trim()).filter(url => url.length > 0), // Split by comma
                sizes: ["S", "M", "L", "XL"] // Default sizes for now
            };

            const id = document.getElementById('productId').value;
            const method = isEditing ? 'PATCH' : 'POST';
            const url = isEditing ? `${API}/${id}` : API;

            try {
                const res = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                if (!res.ok) throw new Error('Action failed');

                showToast(isEditing ? 'Product updated successfully' : 'Product added successfully');
                resetForm();
                fetchProducts();
            } catch (err) {
                console.error(err);
                showToast('Error saving product', true);
            }
        });

        // Edit Product
        window.editProduct = (id) => {
            const p = products.find(x => x.id === id);
            if (!p) return;

            isEditing = true;
            formTitle.textContent = 'Edit Product';
            cancelBtn.classList.remove('hidden');

            document.getElementById('productId').value = p.id;
            document.getElementById('name').value = p.name;
            document.getElementById('price').value = p.price;
            document.getElementById('category').value = p.category;
            document.getElementById('description').value = p.description;
            // Handle array of images, joining with comma for display
            document.getElementById('image').value = Array.isArray(p.images) ? p.images.join(', ') : p.images;

            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        // Delete Product
        window.deleteProduct = async (id) => {
            if (!confirm('Are you sure you want to delete this product? This action cannot be undone.')) return;

            try {
                const res = await fetch(`${API}/${id}`, { method: 'DELETE' });
                if (!res.ok) throw new Error('Delete failed');

                showToast('Product deleted');
                fetchProducts();
            } catch (err) {
                showToast('Failed to delete product', true);
            }
        };

        // Reset Form
        function resetForm() {
            form.reset();
            isEditing = false;
            formTitle.textContent = 'Add New Product';
            cancelBtn.classList.add('hidden');
            document.getElementById('productId').value = '';
        }

        cancelBtn.addEventListener('click', resetForm);

        // Toast Notification
        function showToast(msg, isError = false) {
            toastMsg.textContent = msg;
            toast.classList.remove('translate-y-24');
            if (isError) toast.classList.add('border-red-500');
            else toast.classList.remove('border-red-500');

            setTimeout(() => {
                toast.classList.add('translate-y-24');
            }, 3000);
        }

        // Initialize
        checkAuth();
        fetchProducts();
    </script>
</body>

</html>
